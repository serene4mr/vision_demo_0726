costmap:
  costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 10.0
      always_send_full_costmap: True 
      track_unknown_space: True
      footprint: "[[-0.4, 0.3], [0.4, 0.3], [0.4, -0.3], [-0.4, -0.3]]"

      plugins: [ "semantic_segmentation_layer", "inflation_layer"] #"obstacle_layer",

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0

      semantic_segmentation_layer:
        plugin: "mowbot_semantic_segmentation_layer::SemanticSegmentationLayer"
        enabled: true
        observation_sources: camera
        camera:
          segmentation_topic: "/segmentation/mask" #"/segmentation/mask" 
          confidence_topic: "/segmentation/confidence" #"/segmentation/confidence"
          labels_topic: "/segmentation/label_info"
          pointcloud_topic: "/camera/camera/depth/color/points" #"/segmentation/points" #"/rgbd_camera/depth/points"
          observation_persistence: 0.0
          expected_update_rate: 0.0
          visualize_tile_map: true
          use_cost_selection: true
          # Optional per-source max stamp skew for ApproximateTime (sec). Omit or use -1 for layer default.
          sync_slop: 0.05
          max_obstacle_distance: 5.0
          min_obstacle_distance: 0.3
          tile_map_decay_time: 1.0 #2.0
          # class_types: ["cuttable", "traversable", "non-traversable"]

          # cuttable:
          #   classes: ["cuttable"]
          #   base_cost: 254
          #   max_cost: 0
          #   mark_confidence: 128
          #   samples_to_max_cost: 0
          #   dominant_priority: false

          # traversable:
          #   classes: ["traversable"]
          #   base_cost: 254          # Base penalty for driving here
          #   max_cost: 50           # Max penalty
          #   mark_confidence: 128   # Add some confidence filtering
          #   samples_to_max_cost: 2
          #   dominant_priority: false

          # non-traversable:
          #   classes: ["non-traversable"]
          #   base_cost: 0           # Ignore it (treat as free) until we are sure
          #   max_cost: 254          # LETHAL once confirmed
          #   mark_confidence: 180   # Must be > 70% confident
          #   samples_to_max_cost: 3 # Must see it for 3 frames to confirm
          #   dominant_priority: true

          class_types: ["traversable", "danger"]

          traversable:
            classes: ["traversable", "cuttable", "foliage"]
            base_cost: 0
            max_cost: 0
            mark_confidence: 0
            samples_to_max_cost: 0
            dominant_priority: false

          danger:
            classes: ["non-traversable"]
            base_cost: 254
            max_cost: 254
            mark_confidence: 0
            samples_to_max_cost: 0
            dominant_priority: false


      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.55
        cost_scaling_factor: 3.0
